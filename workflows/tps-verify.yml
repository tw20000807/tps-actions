name: TPS verify

on:
  push:
    branches:
      - '**'
    paths:
      - '*/**'
  workflow_dispatch:
    inputs:
      problems:
        description: 'Problem labels to verify'

jobs:
  run:
    uses: tw20000807/tps-actions/.github/workflows/tps-verify.yml@main
    with:
      problems: ${{ github.event.inputs.problems }}
